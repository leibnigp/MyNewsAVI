{% extends "base.html" %}
{% block content %}
<div class="space-y-6">
    <!-- Stats bar -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" hx-get="/api/stats" hx-trigger="load, every 60s">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
            <div class="text-2xl font-bold text-brand-700" id="stat-new-today">-</div>
            <div class="text-sm text-gray-500">今日新增</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
            <div class="text-2xl font-bold text-green-600" id="stat-route-changes">-</div>
            <div class="text-sm text-gray-500">航线变动</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
            <div class="text-2xl font-bold text-orange-500" id="stat-pending">-</div>
            <div class="text-sm text-gray-500">待分析</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
            <div class="text-2xl font-bold text-gray-700" id="stat-total">-</div>
            <div class="text-sm text-gray-500">总计文章</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
        <form class="flex flex-wrap gap-3 items-center" id="filter-form"
              hx-get="/api/articles" hx-target="#article-list" hx-trigger="submit">
            <select name="carrier" class="border border-gray-300 rounded-md px-3 py-1.5 text-sm bg-white">
                <option value="">所有承运人</option>
                <option value="FedEx">FedEx</option>
                <option value="UPS">UPS</option>
                <option value="Both">FedEx + UPS</option>
            </select>
            <select name="region" class="border border-gray-300 rounded-md px-3 py-1.5 text-sm bg-white">
                <option value="">所有地区</option>
                <option value="Asia-Pacific">亚太</option>
                <option value="Europe">欧洲</option>
                <option value="North America">北美</option>
                <option value="Middle East">中东</option>
                <option value="Latin America">拉美</option>
            </select>
            <select name="route_type" class="border border-gray-300 rounded-md px-3 py-1.5 text-sm bg-white">
                <option value="">所有类型</option>
                <option value="new_route">新航线</option>
                <option value="route_change">航线变更</option>
                <option value="intercontinental">洲际航线</option>
            </select>
            <input type="text" name="keyword" placeholder="关键词搜索..."
                   class="border border-gray-300 rounded-md px-3 py-1.5 text-sm flex-1 min-w-[200px]">
            <button type="submit" class="bg-brand-600 text-white px-4 py-1.5 rounded-md text-sm hover:bg-brand-700 transition-colors">
                筛选
            </button>
        </form>
    </div>

    <!-- Article list -->
    <div id="article-list" hx-get="/api/articles" hx-trigger="load">
        <div class="text-center py-12 text-gray-400">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-1/3 mx-auto mb-2"></div>
                <div class="h-3 bg-gray-200 rounded w-1/4 mx-auto"></div>
            </div>
        </div>
    </div>
</div>

<script>
// Update stats after load
document.body.addEventListener('htmx:afterSettle', function(evt) {
    if (evt.detail.target.id === 'article-list') {
        fetch('/api/stats')
            .then(r => r.json())
            .then(d => {
                document.getElementById('stat-new-today').textContent = d.new_today;
                document.getElementById('stat-route-changes').textContent = d.route_changes_this_week;
                document.getElementById('stat-pending').textContent = d.pending_analysis;
                document.getElementById('stat-total').textContent = d.total_articles;
            });
    }
});
</script>
{% endblock %}
